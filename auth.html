<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Max Dinamyte Travel</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .auth-wrap { width: 100%; max-width: 420px; }
    .auth-brand { text-align: center; margin-bottom: 28px; }
    .auth-brand .logo { font-size: 28px; margin-bottom: 6px; }
    .auth-brand h1 { font-size: 22px; color: var(--ink); }
    .auth-brand p { font-size: 14px; color: var(--ink3); margin-top: 4px; }
    .auth-card { padding: 28px; }
    .auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
    .auth-tab { flex: 1; padding: 10px; background: none; border: none; font-family: var(--font); font-size: 14px; font-weight: 500; cursor: pointer; color: var(--ink3); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .divider { display: flex; align-items: center; gap: 10px; color: var(--ink3); font-size: 13px; margin: 4px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .g-icon { width: 18px; height: 18px; }
    .signin-link { text-align: center; font-size: 13px; color: var(--ink3); margin-top: 8px; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="logo">✈</div>
      <h1>Max Dinamyte Travel</h1>
      <p>Your personal travel map, saved securely.</p>
    </div>
    <div class="card auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
        <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
      </div>

      <div id="error-box" style="display:none" class="error-msg"></div>

      <!-- Sign in form -->
      <div id="form-signin" class="auth-form">
        <button class="btn btn-google" id="btn-google-signin" onclick="signInWithGoogle()">
          <svg class="g-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
        <div class="divider">or</div>
        <div class="field">
          <label for="si-email">Email</label>
          <input type="email" id="si-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="si-pass">Password</label>
          <input type="password" id="si-pass" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary" onclick="signInEmail()">Sign in</button>
        <div class="signin-link"><a href="#" onclick="showReset()">Forgot password?</a></div>
      </div>

      <!-- Sign up form -->
      <div id="form-signup" class="auth-form" style="display:none">
        <button class="btn btn-google" id="btn-google-signup" onclick="signInWithGoogle()">
          <svg class="g-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign up with Google
        </button>
        <div class="divider">or</div>
        <div class="field">
          <label for="su-name">Full name</label>
          <input type="text" id="su-name" placeholder="Jane Smith" autocomplete="name" />
        </div>
        <div class="field">
          <label for="su-email">Email</label>
          <input type="email" id="su-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="su-pass">Password</label>
          <input type="password" id="su-pass" placeholder="At least 6 characters" autocomplete="new-password" />
        </div>
        <button class="btn btn-primary" onclick="signUpEmail()">Create account</button>
      </div>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
             GoogleAuthProvider, signInWithPopup, updateProfile, onAuthStateChanged, sendPasswordResetEmail }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const app  = initializeApp(firebaseConfig);
    const auth = initializeApp ? getAuth(app) : null;
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, user => {
      if (user) {
        window.location.href = user.email === ADMIN_EMAIL ? 'admin.html' : 'index.html';
      }
    });

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
    }
    function clearError() { document.getElementById('error-box').style.display = 'none'; }

    window.switchTab = function(tab) {
      clearError();
      document.getElementById('form-signin').style.display = tab === 'signin' ? 'flex' : 'none';
      document.getElementById('form-signup').style.display = tab === 'signup' ? 'flex' : 'none';
      document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    };

    window.signInWithGoogle = async function() {
      clearError();
      try {
        await signInWithPopup(auth, provider);
      } catch(e) { showError(e.message); }
    };

    window.signInEmail = async function() {
      clearError();
      const email = document.getElementById('si-email').value.trim();
      const pass  = document.getElementById('si-pass').value;
      if (!email || !pass) return showError('Please enter your email and password.');
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch(e) { showError('Incorrect email or password.'); }
    };

    window.signUpEmail = async function() {
      clearError();
      const name  = document.getElementById('su-name').value.trim();
      const email = document.getElementById('su-email').value.trim();
      const pass  = document.getElementById('su-pass').value;
      if (!name || !email || !pass) return showError('Please fill in all fields.');
      if (pass.length < 6) return showError('Password must be at least 6 characters.');
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });
      } catch(e) {
        if (e.code === 'auth/email-already-in-use') showError('An account with this email already exists.');
        else showError(e.message);
      }
    };

    window.showReset = async function() {
      clearError();
      const email = document.getElementById('si-email').value.trim();
      if (!email) return showError('Enter your email above first, then click "Forgot password".');
      try {
        await sendPasswordResetEmail(auth, email);
        document.getElementById('error-box').style.background = '#dcfce7';
        document.getElementById('error-box').style.borderColor = '#86efac';
        document.getElementById('error-box').style.color = '#166534';
        document.getElementById('error-box').textContent = 'Password reset email sent — check your inbox.';
        document.getElementById('error-box').style.display = 'block';
      } catch(e) { showError('Could not send reset email. Check the address and try again.'); }
    };
  </script>
</body>
</html>
